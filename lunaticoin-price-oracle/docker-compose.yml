version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ${APP_LUNATICOIN_PRICE_ORACLE_IP}
      APP_PORT: ${APP_LUNATICOIN_PRICE_ORACLE_PORT}
      PROXY_AUTH_ADD: "false"

  oracle:
    image: ghcr.io/lunaticoin/bitcoin-price-oracle:v0.1.2@sha256:c70c5bce0bd47cc3e8f72ef396768cf8c3b9207f435dc3c7d1d58f7ff0ce7500
    init: true
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_BITCOIN_DATA_DIR}:/bitcoin:ro
    environment:
      RPC_HOST: ${APP_BITCOIN_NODE_IP}
      RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      RPC_USER: ${APP_BITCOIN_RPC_USER}
      RPC_PASS: ${APP_BITCOIN_RPC_PASS}
      BLOCKS_DIR: /bitcoin/blocks
      DATA_DIR: /data
      PORT: "3200"
    networks:
      default:
        ipv4_address: ${APP_LUNATICOIN_PRICE_ORACLE_IP}
