<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="0" fill="#0d1117"/>
  <g transform="translate(128,118)">
    <!-- Bitcoin symbol stylized -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#f7931a" stroke-width="4"/>
    <!-- B letter -->
    <text x="0" y="8" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="52" fill="#f7931a">B</text>
    <!-- Vertical lines through B -->
    <line x1="-8" y1="-28" x2="-8" y2="28" stroke="#f7931a" stroke-width="3"/>
    <line x1="8" y1="-28" x2="8" y2="28" stroke="#f7931a" stroke-width="3"/>
    <!-- Chart bars representing analytics -->
    <g transform="translate(-40, 30)">
      <rect x="0" y="0" width="8" height="24" fill="#58a6ff" rx="1"/>
      <rect x="14" y="-8" width="8" height="32" fill="#58a6ff" rx="1"/>
      <rect x="28" y="-18" width="8" height="42" fill="#58a6ff" rx="1"/>
      <rect x="42" y="-12" width="8" height="36" fill="#58a6ff" rx="1"/>
      <rect x="56" y="-30" width="8" height="54" fill="#58a6ff" rx="1"/>
      <rect x="70" y="-22" width="8" height="46" fill="#58a6ff" rx="1"/>
    </g>
  </g>
  <!-- BRK text -->
  <text x="128" y="232" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="28" fill="#c9d1d9" letter-spacing="6">BRK</text>
</svg>
